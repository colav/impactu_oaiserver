services:
  oaiserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: impactu_oaiserver
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT:-9091}
      - MONGO_URI=${MONGO_URI:-mongodb://localhost:27017}
      - DB_NAME=${DB_NAME:-kahi}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: impactu_frontend
    network_mode: host
    environment:
      - BACKEND_URL=http://localhost:${BACKEND_PORT:-9091}
      - PORT=${PORT:-9090}
    restart: always

# Optional: define a network or external database if needed
# If you want to include MongoDB in the same compose:
#  mongodb:
#    image: mongo:latest
#    ports:
#      - "27017:27017"
